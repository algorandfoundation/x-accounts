name: Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.vscode/**'
      - '.idea/**'

permissions:
  contents: read
  packages: read

jobs:
  logicsig-validate:
    name: Run evm-logicsig validation
    secrets: inherit
    uses: ./.github/workflows/evm-logicsig-ci.yaml

  logicsig-release:
    name: Run evm-logicsig release
    secrets: inherit
    uses: ./.github/workflows/evm-logicsig-cd.yaml
    needs: logicsig-validate
