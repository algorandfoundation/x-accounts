name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
        with:
          version: 10

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.x

      - name: Audit dependencies
        run: pnpm audit --audit-level=high

  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Rewrite SSH to HTTPS for submodule checkout
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
        with:
          version: 10

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.x
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            projects/use-wallet-ui/pnpm-lock.yaml

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
          pnpm install --frozen-lockfile --dir projects/use-wallet-ui

      - name: Install algokit
        run: pipx install algokit

      - name: Format check
        run: |
          algokit project run format-check
          pnpm --filter ./projects/dfx run format:check

      - name: Lint
        run: |
          algokit project run lint
          pnpm --filter ./projects/dfx run lint

      - name: Build evm-sdk and submodules
        run: |
          algokit project run build --project-name evm-sdk
          algokit project run build --project-name use-wallet
          algokit project run build --project-name use-wallet-ui

      - name: Typecheck
        run: |
          algokit project run typecheck
          pnpm --filter ./projects/dfx run typecheck

      - name: Test dfx
        run: pnpm --filter ./projects/dfx test

      - name: Build emv-logicsig
        run: algokit project run build --project-name evm-logicsig

      - name: Start LocalNet
        run: algokit localnet start

      - name: Test evm-logicsig
        run: algokit project run test --project-name evm-logicsig

      - name: Build remaining projects
        run: |
          pnpm --filter ./projects/dfx build
          algokit project run build --project-name rpc-server
          algokit project run build --project-name frontend
          algokit project run build --project-name portal
